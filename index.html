<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>생각을 키우는 AI 코치 활용 로봇 수업 자료</title>
  <link rel="stylesheet" href="./assets/css/main.css" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <link rel="stylesheet" href="./assets/css/components.css" />
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <section class="login-card">
      <div class="login-hero">
        <p class="eyebrow">Robot Lab Prototype</p>
        <h1>생각을 키우는<br />AI 코치 활용 로봇 수업 자료</h1>
        <p>학생은 실습 중 질문하며 사고 과정을 확장하고, 교사는 질문과 엔지니어링 노트를 확인합니다.</p>
        <div class="notice">현재 버전은 실제 AI API 없이 공통 AI 어시스턴트 모듈로 응답합니다.</div>
      </div>
      <form id="loginForm" class="login-form">
        <h2>로그인</h2>
        <label for="nameInput">이름</label>
        <input id="nameInput" type="text" value="홍길동" autocomplete="name" />
        <label for="idInput">학번 또는 교사 계정</label>
        <input id="idInput" type="text" value="10101" autocomplete="username" />
        <label for="roleInput">역할</label>
        <select id="roleInput">
          <option value="student">학생</option>
          <option value="teacher">교사</option>
        </select>
        <button class="btn primary full" type="submit">시작하기</button>
      </form>
    </section>
  </div>

  <div id="appScreen" class="app-shell hidden">
    <aside class="sidebar">
      <div class="brand">AI 로봇 코치<br />수업 플랫폼</div>
      <div class="sub">Arduino · Robot Arm · Mecanum · Engineering Note</div>

      <nav class="nav" aria-label="주 메뉴">
        <button class="active" data-route="dashboard" type="button">대시보드</button>
        <button data-route="arduino" type="button">아두이노 실습실</button>
        <button data-route="robotarm" type="button">로봇팔 실습실</button>
        <div class="nav-subgroup" aria-label="로봇팔 실습실 하위 메뉴">
          <button data-route="robotarm-2d" type="button">2D 실습</button>
          <button data-route="robotarm-3d" type="button">3D 실습</button>
          <button data-route="robotarm-pickup" type="button">물건 옮기기</button>
        </div>
        <button data-route="mecanum" type="button">메카넘 실습실</button>
        <button data-route="engineering-note" type="button">엔지니어링 노트</button>
        <button data-route="teacher" type="button">교사용 관리</button>
      </nav>

      <div class="userbox">
        <b id="userName">홍길동 (10101)</b>
        <span id="userRole">학생</span>
        <span>저장 상태: <strong id="saveStatus">대기 중</strong></span>
        <button id="logoutBtn" class="btn ghost full" type="button">로그아웃</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="title">
          <h1 id="pageTitle">대시보드</h1>
          <p id="pageDesc">오늘 학습할 모듈을 선택하고 진행 상황을 확인합니다.</p>
        </div>
        <div class="role-toggle" aria-label="역할 전환">
          <button id="studentToggle" class="active" data-role="student" type="button">학생</button>
          <button id="teacherToggle" data-role="teacher" type="button">교사</button>
        </div>
      </header>

      <section id="pageContent" class="page-content"></section>
    </main>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
